config_version: 14

log_level: info

token_usage:
  enabled: true

# ============================================================================
# Model: Claude Sonnet 4
# ============================================================================
models:
  - name: deepseek-chat
    display_name: DeepSeek V3 (fallback)
    use: langchain_deepseek:ChatDeepSeek
    model: deepseek-chat
    api_key: $DEEPSEEK_API_KEY
    supports_thinking: false
    supports_vision: false

  - name: claude-sonnet-4
    display_name: Claude Sonnet 4
    use: langchain_anthropic:ChatAnthropic
    model: claude-sonnet-4-6
    api_key: $ANTHROPIC_API_KEY
    default_request_timeout: 600.0
    max_retries: 2
    max_tokens: 16000
    supports_vision: true
    supports_thinking: true
    when_thinking_enabled:
      thinking:
        type: enabled
        budget_tokens: 4096
    when_thinking_disabled:
      thinking:
        type: disabled

# ============================================================================
# Tool groups
# ============================================================================
tool_groups:
  - name: web
  - name: file:read
  - name: file:write
  - name: bash
  - name: oracle

# ============================================================================
# Tools
# ============================================================================
tools:
  # --- Web ---
  - name: web_search
    group: web
    use: deerflow.community.ddg_search.tools:web_search_tool
    max_results: 5

  - name: web_fetch
    group: web
    use: deerflow.community.jina_ai.tools:web_fetch_tool
    timeout: 10

  - name: image_search
    group: web
    use: deerflow.community.image_search.tools:image_search_tool
    max_results: 5

  # --- File operations ---
  - name: ls
    group: file:read
    use: deerflow.sandbox.tools:ls_tool

  - name: read_file
    group: file:read
    use: deerflow.sandbox.tools:read_file_tool

  - name: glob
    group: file:read
    use: deerflow.sandbox.tools:glob_tool
    max_results: 200

  - name: grep
    group: file:read
    use: deerflow.sandbox.tools:grep_tool
    max_results: 100

  - name: write_file
    group: file:write
    use: deerflow.sandbox.tools:write_file_tool

  - name: str_replace
    group: file:write
    use: deerflow.sandbox.tools:str_replace_tool

  - name: bash
    group: bash
    use: deerflow.sandbox.tools:bash_tool

  # --- Domestic Oracle: guarded home actions (route through consent gate + ledger) ---
  - name: control_device
    group: oracle
    use: domestic_oracle.tools.home_tools:control_device

  - name: make_purchase
    group: oracle
    use: domestic_oracle.tools.purchase_tools:make_purchase

  - name: send_message
    group: oracle
    use: domestic_oracle.tools.message_tools:send_message

  # --- Domestic Oracle: safe read (logged to ledger, no consent gate) ---
  - name: discover_devices
    group: oracle
    use: domestic_oracle.tools.safe_tools:discover_devices

tool_search:
  enabled: false

tool_output:
  enabled: true
  externalize_min_chars: 12000
  preview_head_chars: 2000
  preview_tail_chars: 1000
  fallback_max_chars: 30000
  fallback_head_chars: 8000
  fallback_tail_chars: 3000
  storage_subdir: ".tool-results"
  exempt_tools:
    - read_file
    - read_file_tool

suggestions:
  enabled: true

loop_detection:
  enabled: true
  warn_threshold: 3
  hard_limit: 5
  window_size: 20
  max_tracked_threads: 100
  tool_freq_warn: 30
  tool_freq_hard_limit: 50

safety_finish_reason:
  enabled: true

uploads:
  max_files: 10
  max_file_size: 52428800
  max_total_size: 104857600
  auto_convert_documents: false
  pdf_converter: auto

sandbox:
  use: deerflow.sandbox.local:LocalSandboxProvider
  allow_host_bash: false
  bash_output_max_chars: 20000
  read_file_output_max_chars: 50000
  ls_output_max_chars: 20000

memory:
  enabled: true
  storage_path: oracle_memory.json
  debounce_seconds: 30
  model_name: null
  max_facts: 100
  fact_confidence_threshold: 0.7
  injection_enabled: true
  max_injection_tokens: 2000
  token_counting: tiktoken

title:
  enabled: true
  max_words: 6
  max_chars: 60
  model_name: null

summarization:
  enabled: true
  model_name: null
  trigger:
    - type: tokens
      value: 32000
  keep:
    type: messages
    value: 10
  trim_tokens_to_summarize: 15564
  summary_prompt: null
  preserve_recent_skill_count: 5
  preserve_recent_skill_tokens: 25000
  preserve_recent_skill_tokens_per_skill: 5000
  skill_file_read_tool_names:
    - read_file
    - read
    - view
    - cat

database:
  backend: sqlite
  sqlite_dir: .deer-flow/data

run_events:
  backend: memory
  max_trace_content: 10240
  track_token_usage: true

agents_api:
  enabled: false

skill_evolution:
  enabled: false
  moderation_model_name: null
